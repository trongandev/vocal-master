server {
    server_name python.lrm.io.vn;

    location / {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/python.lrm.io.vn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/python.lrm.io.vn/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    server_name api.lrm.io.vn;

    location / {
        proxy_pass http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
}


server {
    if ($host = python.lrm.io.vn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    server_name python.lrm.io.vn;
    listen 80;
    return 404; # managed by Certbot
}

server {
    server_name lrm.io.vn;

    root /home/vocal-master/frontend/dist;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    listen 80;
}